{{ define "main" }}
<a href="{{ .Site.BaseURL }}posts/" class="back-link">← blog</a>

<article>
  <h1>{{ .Title }}</h1>
  <div class="meta">
    <time>{{ .Date.Format "January 2, 2006" }}</time> · {{ .ReadingTime }} min read
    {{ with .Params.tags }}
      {{ range . }} · {{ . }}{{ end }}
    {{ end }}
  </div>
  <section>
    {{ .Content }}
  </section>
</article>

<footer class="post-footer">
  Denis Khranovskii · <a href="https://www.linkedin.com/in/denis-khranovskiy/">LinkedIn</a>
</footer>
{{ end }}
