{{ define "main" }}
<h1>{{ .Title }}</h1>
<nav>
  <a href="{{ .Site.BaseURL }}">home</a>
</nav>

<ul class="post-list">
  {{ range .Pages.ByDate.Reverse }}
  <li class="post-item">
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    <span class="post-date">{{ .Date.Format "Jan 2006" }}</span>
  </li>
  {{ end }}
</ul>
{{ end }}
