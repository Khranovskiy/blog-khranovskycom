{{ define "main" }}
<h1>{{ .Site.Title }}</h1>
<nav>
  <a href="{{ .Site.BaseURL }}posts/">posts</a>
</nav>

<ul class="post-list">
  {{ range (where .Site.RegularPages "Section" "posts").ByDate.Reverse }}
  <li class="post-item">
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    <span class="post-date">{{ .Date.Format "Jan 2006" }}</span>
  </li>
  {{ end }}
</ul>
{{ end }}
