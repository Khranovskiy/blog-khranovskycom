<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  {{ if .Params.ogimage }}<meta property="og:image" content="{{ .Params.ogimage | absURL }}">
  {{ else }}{{ with .Site.Params.ogimage }}<meta property="og:image" content="{{ . | absURL }}">{{ end }}
  {{ end }}
  <style>
    :root {
      --bg: #fcfcfc;
      --fg: #2c353d;
      --muted: #666;
      --border: #ddd;
      --link: #093795;
      --code-bg: #e3e1e1;
      --font: Charter, 'Bitstream Charter', 'Sitka Text', Cambria, serif;
      --mono: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
      --max: 680px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #2e3440;
        --fg: #d8dee9;
        --muted: #8a95a3;
        --border: #3d4450;
        --link: #6fc8ff;
        --code-bg: #1a2033;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      font-size: 18px;
      line-height: 1.6;
      color: var(--fg);
      background: var(--bg);
      padding: 3rem 20px;
    }
    .container {
      max-width: var(--max);
      margin: 0 auto;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4rem;
      font-family: var(--mono);
      font-size: 0.85rem;
    }
    header .site-title {
      font-weight: 600;
      color: var(--fg);
    }
    nav a {
      color: var(--muted);
    }
    nav a:hover {
      color: var(--fg);
    }
    .back-link {
      display: inline-block;
      margin-bottom: 2.5rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.85rem;
    }
    .back-link:hover {
      color: var(--fg);
    }
    .post-list {
      list-style: none;
      border-top: 1px solid var(--border);
      padding-top: 2rem;
    }
    .post-item {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
      align-items: baseline;
    }
    .post-meta {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
    }
    .post-item h2 {
      font-size: 1rem;
      font-weight: normal;
      line-height: 1.4;
    }
    .post-item h2 a:hover {
      color: var(--muted);
    }
    article {
      margin-bottom: 4rem;
    }
    article h1 {
      font-size: 2.2rem;
      font-weight: normal;
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }
    article .meta {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 3rem;
    }
    article .content > * + * {
      margin-top: 1.5rem;
    }
    article .content h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-top: 3rem;
    }
    article .content h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 2rem;
    }
    article .content a {
      color: var(--link);
      text-decoration: underline;
    }
    article .content blockquote {
      font-style: italic;
      border-left: 2px solid #851d27;
      padding-left: 1em;
      color: var(--muted);
    }
    article .content ul,
    article .content ol {
      padding-left: 1.5rem;
    }
    article .content li + li {
      margin-top: 0.2rem;
    }
    article .content code {
      font-family: var(--mono);
      font-size: 0.85rem;
      background: var(--code-bg);
      padding: 0.2rem 0.4rem;
      border-radius: 0.25em;
    }
    article .content pre {
      border: 1px solid var(--border);
      padding: 1rem;
      overflow-x: auto;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    article .content pre code {
      background: none;
      padding: 0;
      border-radius: 0;
    }
    article .content img {
      max-width: 100%;
      height: auto;
    }
    .heading-anchor {
      opacity: 0;
      margin-left: 0.4rem;
      font-size: 0.8em;
      text-decoration: none;
      color: var(--muted);
    }
    h2:hover .heading-anchor,
    h3:hover .heading-anchor {
      opacity: 1;
    }
    .post-metadata {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      font-size: 0.85rem;
    }
    .post-metadata td {
      padding: 3px 12px;
    }
    .post-metadata .meta-key {
      text-align: right;
      font-family: var(--mono);
      color: var(--muted);
    }
    .post-metadata a {
      color: var(--fg);
      text-decoration: none;
    }
    .post-metadata a:hover {
      text-decoration: underline;
    }
    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
    }
    footer a {
      color: var(--muted);
    }
    footer a:hover {
      color: var(--fg);
    }
    .aside-content > * + * { margin-top: 1.5rem; }
    /*body.layout-wide { line-height: 1.45; }*/
    body.layout-wide .container { max-width: 680px; padding-left: 0px; }
    body.layout-wide article .content > * { max-width: var(--max); }
    body.layout-wide article .content > .aside-section { max-width: none; }
    .aside-section {
      display: grid;
      grid-template-columns: 520px 420px;
      gap: 2.5rem;
      align-items: start;
    }
    .aside-image {
      position: sticky;
      top: 2rem;
    }
    .aside-image img {
      width: 100%;
      border: 0px solid var(--border);
      border-radius: 8px;
    }
    @media (max-width: 768px) {
      .aside-section {
        display: block;
      }
      .aside-image {
        display: none;
      }
    }
    body.font-small { font-size: 15px; }
    body.font-small article .meta { margin-bottom: 1.5rem; }
    body.font-small article .content > * + * { margin-top: 1rem; }
    body.font-small article .content h2 { margin-top: 1.8rem; }
    body.font-small article .content h3 { margin-top: 1.2rem; }
    body.font-large { font-size: 21px; }
    @media (max-width: 600px) {
      body {
        padding: 2rem 1.25rem;
      }
      .post-item {
        grid-template-columns: 1fr;
        gap: 0.25rem;
        margin-bottom: 2rem;
      }
    }
  </style>
</head>
<body{{ with .Params.fontsize }} class="font-{{ . }}{{ if $.Params.layout }} layout-{{ $.Params.layout }}{{ end }}"{{ else }}{{ with .Params.layout }} class="layout-{{ . }}"{{ end }}{{ end }}>
  <div class="container">
    {{ block "main" . }}{{ end }}
  </div>
</body>
</html>
