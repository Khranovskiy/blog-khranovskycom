{{ define "main" }}
<header>
  <a href="{{ .Site.BaseURL }}" class="site-title">{{ .Site.Title }}</a>
  <nav>
    <a href="{{ .Site.BaseURL }}">home</a>
  </nav>
</header>

<main>
  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    <li class="post-item">
      <div class="post-meta"><time>{{ .Date.Format "Jan 2, 2006" }}</time></div>
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
    </li>
    {{ end }}
  </ul>
</main>
{{ end }}
