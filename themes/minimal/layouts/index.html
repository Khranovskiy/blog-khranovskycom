{{ define "main" }}
<header>
  <span class="site-title">{{ .Site.Title }}</span>
  <nav>
    <a href="{{ .Site.BaseURL }}posts/">posts</a>
  </nav>
</header>

<main>
  <ul class="post-list">
    {{ range (where .Site.RegularPages "Section" "posts").ByDate.Reverse }}
    <li class="post-item">
      <div class="post-meta"><time>{{ .Date.Format "Jan 2, 2006" }}</time></div>
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
    </li>
    {{ end }}
  </ul>
</main>
{{ end }}
